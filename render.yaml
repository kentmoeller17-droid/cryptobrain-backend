services:
  - type: web
    name: brain-v106
    runtime: python
    buildCommand: pip install -r requirements.txt
    startCommand: python main.py
    plan: starter
    envVars:
      - key: PYTHON_VERSION
        value: 3.13.5
      - key: APP_EXTERNAL_URL
        sync: false
      - key: APP_STORAGE_ROOT
        value: /var/data
      - key: TRUST_PROXY
        value: "1"
      - key: FORCE_HTTPS
        value: "1"
      - key: SESSION_COOKIE_SECURE
        value: auto
      - key: HOST
        value: 0.0.0.0
      - key: PORT
        value: "10000"
      - key: AUTO_OPEN_BROWSER
        value: "0"
    disk:
      name: brain-data
      mountPath: /var/data
      sizeGB: 1
